name: 국토부 실거래가 수집

on:
  workflow_dispatch:
    inputs:
      type:
        description: '데이터 유형'
        required: false
        default: 'apt-trade'
        type: choice
        options:
          - apt-trade    # 아파트 매매
          - apt-rent     # 아파트 전월세
          - offi-trade   # 오피스텔 매매
          - offi-rent    # 오피스텔 전월세
          - rh-trade     # 연립다세대 매매
          - sh-trade     # 단독다가구 매매
      ym:
        description: '수집 연월 (YYYYMM, 빈 칸이면 전월 자동)'
        required: false
        default: ''
      ym_range:
        description: '연월 범위 (예: 202401-202412, ym보다 우선)'
        required: false
        default: ''
      regions:
        description: '지역 (전국 | 서울,경기,인천 | ...)'
        required: false
        default: '전국'
      mode:
        description: '수집 모드'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental  # 기수집 스킵 (state 파일 사용)
          - full-reset   # state 초기화 후 전체 재수집

  schedule:
    # 매월 2일 오전 9시 KST (UTC 00:00) — 전월 데이터 수집
    - cron: '0 0 2 * *'

env:
  STATE_FILE: /tmp/molit-state.json
  OUTPUT_FILE: /tmp/molit-result.parquet
  META_FILE: /tmp/molit-result.meta.json
  NODE_VERSION: '22'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 전국 수집 시 최대 3시간

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 의존성 설치
        run: npm install

      # ── State 복원 (증분 수집) ──
      - name: State 파일 복원
        id: cache-state
        uses: actions/cache@v4
        with:
          path: ${{ env.STATE_FILE }}
          key: molit-state-${{ github.event.inputs.type || 'apt-trade' }}-${{ github.run_id }}
          restore-keys: |
            molit-state-${{ github.event.inputs.type || 'apt-trade' }}-

      - name: State 초기화 (full-reset 모드)
        if: github.event.inputs.mode == 'full-reset'
        run: |
          rm -f ${{ env.STATE_FILE }}
          echo "⚠️ State 초기화 — 전체 재수집 모드"

      - name: State 현황 확인
        run: |
          if [ -f "${{ env.STATE_FILE }}" ]; then
            python3 -c "
          import json
          with open('${{ env.STATE_FILE }}') as f:
              s = json.load(f)
          print(f'📋 기수집 키: {len(s.get(\"collected\", {}))}개')
          print(f'   마지막 실행: {s.get(\"lastRunAt\", \"없음\")}')
          "
          else
            echo "📋 State 없음 — 최초 실행"
          fi

      # ── 연월 결정 ──
      - name: 수집 연월 결정
        id: determine-ym
        run: |
          if [ -n "${{ github.event.inputs.ym_range }}" ]; then
            echo "YM_ARG=--ym-range ${{ github.event.inputs.ym_range }}" >> $GITHUB_OUTPUT
            echo "YM_DESC=${{ github.event.inputs.ym_range }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.ym }}" ]; then
            echo "YM_ARG=--ym ${{ github.event.inputs.ym }}" >> $GITHUB_OUTPUT
            echo "YM_DESC=${{ github.event.inputs.ym }}" >> $GITHUB_OUTPUT
          else
            # 전월 자동 계산
            PREV_YM=$(python3 -c "
          from datetime import date
          import calendar
          today = date.today()
          first = today.replace(day=1)
          last_month = first.replace(day=1)
          import datetime
          prev = first - datetime.timedelta(days=1)
          print(f'{prev.year}{prev.month:02d}')
          ")
            echo "YM_ARG=--ym $PREV_YM" >> $GITHUB_OUTPUT
            echo "YM_DESC=$PREV_YM (자동)" >> $GITHUB_OUTPUT
          fi

      # ── 실거래가 수집 ──
      - name: 실거래가 수집
        env:
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
        run: |
          DATA_TYPE="${{ github.event.inputs.type || 'apt-trade' }}"
          REGIONS="${{ github.event.inputs.regions || '전국' }}"
          YM_ARG="${{ steps.determine-ym.outputs.YM_ARG }}"
          YM_DESC="${{ steps.determine-ym.outputs.YM_DESC }}"
          STATE_ARG=""
          if [ "${{ github.event.inputs.mode }}" != "full-reset" ]; then
            STATE_ARG="--state-file ${{ env.STATE_FILE }}"
          fi

          echo "📡 수집 시작: ${DATA_TYPE} / ${REGIONS} / ${YM_DESC}"

          node --experimental-strip-types scripts/collect-molit.ts \
            --type "$DATA_TYPE" \
            $YM_ARG \
            --regions "$REGIONS" \
            --output "${{ env.OUTPUT_FILE }}" \
            $STATE_ARG

      # ── 결과 요약 ──
      - name: pyarrow 설치
        if: always()
        run: pip install pyarrow --quiet

      - name: 수집 결과 요약
        if: always()
        run: |
          if [ -f "${{ env.META_FILE }}" ]; then
            python3 -c "
          import json
          with open('${{ env.META_FILE }}') as f:
              meta = json.load(f)
          print(f'✅ 수집 완료')
          print(f'   유형: {meta.get(\"dataType\")}')
          print(f'   연월: {meta.get(\"ymList\")}')
          print(f'   지역: {meta.get(\"regions\")}')
          print(f'   총 거래건수: {meta.get(\"totalItems\", 0):,}건')
          print(f'   성공: {meta.get(\"successJobs\")}  스킵: {meta.get(\"skipJobs\")}  실패: {meta.get(\"errorJobs\")}')
          "
          else
            echo "메타 파일 없음"
          fi

          if [ -f "${{ env.OUTPUT_FILE }}" ]; then
            python3 -c "
          import pyarrow.parquet as pq
          from collections import Counter
          table = pq.read_table('${{ env.OUTPUT_FILE }}')
          print(f'   파케이 행수: {table.num_rows:,}건  컬럼수: {table.num_columns}개')

          # 지역별 통계 (상위 10)
          if table.num_rows > 0 and '_lawdCd' in table.schema.names:
              codes = table.column('_lawdCd').to_pylist()
              by_region = Counter(str(c)[:5] for c in codes if c)
              print()
              print('상위 10개 시군구:')
              for code, cnt in by_region.most_common(10):
                  print(f'  {code}: {cnt:,}건')
          "
          else
            echo "결과 파일(parquet) 없음"
          fi

          if [ -f "${{ env.STATE_FILE }}" ]; then
            python3 -c "
          import json
          with open('${{ env.STATE_FILE }}') as f:
              s = json.load(f)
          print(f'📋 누적 수집 키: {len(s.get(\"collected\", {})):,}개')
          print(f'   마지막 실행: {s.get(\"lastRunAt\", \"없음\")}')
          "
          fi

      # ── 아티팩트 업로드 ──
      - name: 결과 파일 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: molit-result-${{ github.event.inputs.type || 'apt-trade' }}-${{ github.run_id }}
          path: |
            ${{ env.OUTPUT_FILE }}
            ${{ env.META_FILE }}
            ${{ env.STATE_FILE }}
          retention-days: 90
          if-no-files-found: ignore
