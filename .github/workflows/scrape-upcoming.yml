name: 매각예정 물건 수집 (courtauction.go.kr)

on:
  workflow_dispatch:
    inputs:
      court:
        description: '법원 이름 (예: 서울중앙지방법원)'
        required: false
        default: '서울중앙지방법원'
      limit:
        description: '수집 건수 (1=단건 테스트, 0=전체)'
        required: false
        default: '1'
  schedule:
    # 매일 오전 8시 KST (UTC 23:00 전날)
    - cron: '0 23 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 의존성 설치
        run: npm install
        working-directory: .

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps

      - name: 매각예정 물건 수집
        run: |
          COURT="${{ github.event.inputs.court || '서울중앙지방법원' }}"
          LIMIT="${{ github.event.inputs.limit || '1' }}"
          node --experimental-strip-types scripts/scrape-upcoming.ts \
            --court "$COURT" \
            --limit "$LIMIT" \
            --output /tmp/upcoming-result.json
        timeout-minutes: 25

      - name: 결과 통계
        if: always()
        run: |
          if [ -f /tmp/upcoming-result.json ]; then
            python3 -c "
          import json
          with open('/tmp/upcoming-result.json') as f:
              d = json.load(f)
          meta = d.get('meta', {})
          results = d.get('results', [])
          print(f'법원: {meta.get(\"court\")}')
          print(f'수집일시: {meta.get(\"collectedAt\")}')
          print(f'수집 건수: {len(results)}건')
          for r in results[:5]:
              print(f'  - {r[\"caseNumber\"]} | {r[\"propertyType\"]} | {r[\"auctionDate\"]} | {r[\"address\"][:40]}')
              print(f'    감정가:{r[\"appraisedValue\"]:,} | 최저:{r[\"minBidPrice\"]:,}({r[\"minBidRate\"]}%) | 유찰:{r[\"failedBids\"]}회')
              print(f'    기일:{len(r[\"dateRecords\"])}건 | 목록:{len(r[\"propertyRecords\"])}건 | 감정평가:{len(r[\"appraisalSummary\"])}자')
          "
          fi

      - name: 결과 파일 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upcoming-result-${{ github.run_id }}
          path: /tmp/upcoming-result.json
          retention-days: 30
